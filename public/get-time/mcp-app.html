<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarm MCP Interface</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        padding: 2rem; 
        max-width: 1200px; 
        margin: 0 auto; 
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
        min-height: 100vh;
        color: #e2e8f0; 
      }
      .card { 
        background: rgba(30, 41, 59, 0.6);
        backdrop-filter: blur(10px);
        padding: 2rem; 
        border-radius: 20px; 
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(249, 115, 22, 0.1);
        border: 1px solid rgba(249, 115, 22, 0.2); 
      }
      h1 { 
        margin-top: 0; 
        margin-bottom: 20px;
        background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-size: 2rem; 
        font-weight: 600;
        letter-spacing: -0.5px;
        text-align: center;
      }
      h2 { 
        color: #e2e8f0; 
        font-size: 1.2rem; 
        margin-top: 1.5rem; 
      }
      p { 
        color: #94a3b8; 
      }
      button { 
        background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
        color: white; 
        border: none; 
        padding: 0.75rem 1.5rem; 
        border-radius: 12px; 
        font-weight: 600; 
        cursor: pointer; 
        transition: all 0.3s ease; 
        font-size: 1rem; 
        margin-right: 0.5rem; 
        box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        position: relative;
        overflow: hidden;
      }
      button::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #ea580c 0%, #f97316 100%);
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      button:hover::before {
        opacity: 1;
      }
      button:hover { 
        box-shadow: 0 6px 20px rgba(249, 115, 22, 0.5);
      }
      button span {
        position: relative;
        z-index: 1;
      }
      button:disabled { 
        opacity: 0.5; 
        cursor: not-allowed;
        transform: none;
      }
      .timestamp { 
        color: #10b981; 
        font-weight: bold; 
      }
      table { 
        width: 100%; 
        border-collapse: collapse; 
        margin-top: 1rem; 
      }
      th, td { 
        padding: 0.75rem; 
        text-align: left; 
        border-bottom: 1px solid rgba(234, 88, 12, 0.2); 
      }
      th { 
        background: rgba(249, 115, 22, 0.1); 
        font-weight: 600; 
        color: #f97316; 
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 0.5px;
      }
      tr:hover { 
        background: rgba(234, 88, 12, 0.1); 
      }
      .batch-id { 
        font-family: monospace; 
        font-size: 0.85rem; 
        color: #94a3b8; 
        word-break: break-all; 
      }
      .stamp-checkbox {
        cursor: pointer;
        width: 18px;
        height: 18px;
        accent-color: #f97316;
      }
      .usable-yes { 
        color: #10b981; 
        font-weight: 600; 
      }
      .usable-no { 
        color: #f43f5e; 
        font-weight: 600; 
      }
      .loading { 
        color: #94a3b8; 
        font-style: italic; 
      }
      .error { 
        color: #fca5a5; 
        padding: 1rem; 
        background: rgba(239, 68, 68, 0.1); 
        border-radius: 12px; 
        margin-top: 1rem; 
        border: 1px solid rgba(239, 68, 68, 0.3);
      }
      .file-input-wrapper { 
        margin: 1rem 0; 
        display: flex; 
        align-items: center; 
        gap: 1rem; 
      }
      input[type="file"] { 
        padding: 0.75rem; 
        border: 2px solid rgba(234, 88, 12, 0.3); 
        border-radius: 12px; 
        cursor: pointer; 
        flex: 1; 
        background: rgba(15, 23, 42, 0.5);
        color: #e2e8f0;
        transition: all 0.3s ease;
      }
      input[type="file"]:hover { 
        border-color: #f97316; 
        background: rgba(249, 115, 22, 0.1);
      }
      input[type="file"]::file-selector-button {
        background: linear-gradient(135deg, #ea580c 0%, #f97316 100%);
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        cursor: pointer;
        margin-right: 1rem;
        font-weight: 600;
      }
      .preview-area { 
        margin-top: 1.5rem; 
        padding: 1rem; 
        background: rgba(15, 23, 42, 0.5); 
        border: 2px dashed rgba(234, 88, 12, 0.3); 
        border-radius: 12px; 
        min-height: 100px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
      }
      .preview-area img { 
        max-width: 100%; 
        max-height: 400px; 
        border-radius: 12px; 
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }
      .file-info { 
        margin-top: 1rem; 
        padding: 0.75rem; 
        background: rgba(16, 185, 129, 0.1); 
        border-left: 4px solid #10b981; 
        border-radius: 8px; 
        color: #cbd5e1;
      }
      .swarm-link { 
        color: #f97316; 
        text-decoration: none; 
        font-weight: 600; 
        transition: color 0.2s;
      }
      .swarm-link:hover { 
        color: #ea580c;
        text-decoration: underline; 
      }
      .tabs { 
        display: flex; 
        border-bottom: 2px solid rgba(234, 88, 12, 0.3); 
        margin-bottom: 1.5rem; 
        gap: 0.5rem; 
      }
      .tab { 
        padding: 0.75rem 1.5rem; 
        background: transparent; 
        border: none; 
        border-bottom: 3px solid transparent; 
        cursor: pointer; 
        font-weight: 600; 
        color: #94a3b8; 
        transition: all 0.3s ease; 
        margin: 0; 
        border-radius: 0; 
        box-shadow: none;
      }
      .tab::before {
        display: none;
      }
      .tab:hover { 
        color: #f97316; 
        background: rgba(249, 115, 22, 0.1); 
        transform: none;
      }
      .tab.active { 
        color: #f97316; 
        border-bottom-color: #f97316; 
        background: rgba(249, 115, 22, 0.1); 
        box-shadow: 0 4px 15px rgba(249, 115, 22, 0.2);
      }
      .tab-content { 
        display: none; 
      }
      .tab-content.active { 
        display: block; 
        max-height: 50vh;
        overflow-y: auto;
      }
      .tab-content.active::-webkit-scrollbar {
        width: 8px;
      }
      .tab-content.active::-webkit-scrollbar-track {
        background: rgba(15, 23, 42, 0.5);
        border-radius: 4px;
      }
      .tab-content.active::-webkit-scrollbar-thumb {
        background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
        border-radius: 4px;
      }
      .tab-content.active::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(135deg, #ea580c 0%, #f97316 100%);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Swarm MCP App</h1>

      <div class="tabs">
        <button class="tab active" data-tab="stamps"><span>Postage Stamps</span></button>
        <button class="tab" data-tab="upload"><span>Upload File</span></button>
      </div>

      <div id="stamps-tab" class="tab-content active">
        <button id="stamps-btn"><span>Load Postage Stamps</span></button>
        <div id="stamps-table"></div>
      </div>

      <div id="upload-tab" class="tab-content">
        <p>Select a file to upload to the decentralized storage</p>
        
        <div class="file-input-wrapper">
          <input type="file" id="file-input" accept="*/*" />
          <button id="upload-btn" disabled><span>Upload to Swarm</span></button>
        </div>

        <div id="upload-result"></div>
        
        <div class="preview-area" id="preview-area" style="display: none;">
          <p class="loading">Preview will appear here...</p>
        </div>
      </div>
    </div>

    <script type="module" src="./src/mcp-app.ts"></script>
  </body>
</html>
