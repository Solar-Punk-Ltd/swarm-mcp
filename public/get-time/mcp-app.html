<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarm MCP</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        padding: 2rem; 
        max-width: 1200px; 
        margin: 0 auto; 
        background: linear-gradient(135deg, #1c3162 0%, #1e293b 50%, #4b6589 100%);
        min-height: 100vh;
        color: #e2e8f0; 
      }
      .card { 
        background: rgba(30, 41, 59, 0.6);
        backdrop-filter: blur(10px);
        padding: 2rem; 
        border-radius: 20px; 
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(249, 115, 22, 0.1);
        border: 1px solid rgba(249, 115, 22, 0.2); 
      }
      h1 { 
        margin-top: 0; 
        margin-bottom: 20px;
        background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        font-size: 2rem; 
        font-weight: 600;
        letter-spacing: -0.5px;
        text-align: center;
      }
      h2 { 
        color: #e2e8f0; 
        font-size: 1.2rem; 
        margin-top: 1.5rem; 
      }
      p { 
        color: #94a3b8; 
      }
      button { 
        background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
        color: white; 
        border: none; 
        padding: 0.75rem 1.5rem; 
        border-radius: 12px; 
        font-weight: 600; 
        cursor: pointer; 
        transition: all 0.3s ease; 
        font-size: 1rem; 
        margin-right: 0.5rem; 
        box-shadow: 0 4px 15px rgba(249, 115, 22, 0.3);
        position: relative;
        overflow: hidden;
      }
      button::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #ea580c 0%, #f97316 100%);
        opacity: 0;
        transition: opacity 0.3s ease;
      }
      button:hover::before {
        opacity: 1;
      }
      button:hover { 
        box-shadow: 0 6px 20px rgba(249, 115, 22, 0.5);
      }
      button span {
        position: relative;
        z-index: 1;
      }
      button:disabled { 
        opacity: 0.5; 
        cursor: not-allowed;
        transform: none;
      }
      .timestamp { 
        color: #10b981; 
        font-weight: bold; 
      }
      table { 
        width: 100%; 
        border-collapse: collapse; 
        margin-top: 1rem; 
      }
      th, td { 
        padding: 0.75rem; 
        text-align: left; 
        border-bottom: 1px solid rgba(234, 88, 12, 0.2); 
      }
      th { 
        background: rgba(249, 115, 22, 0.1); 
        font-weight: 600; 
        color: #f97316; 
        text-transform: uppercase;
        font-size: 0.85rem;
        letter-spacing: 0.5px;
      }
      tr:hover { 
        background: rgba(234, 88, 12, 0.1); 
      }
      .batch-id { 
        font-family: monospace; 
        font-size: 0.85rem; 
        color: #94a3b8; 
        word-break: break-all; 
      }
      .stamp-checkbox {
        cursor: pointer;
        width: 18px;
        height: 18px;
        accent-color: #f97316;
      }
      .usable-yes { 
        color: #10b981; 
        font-weight: 600; 
      }
      .usable-no { 
        color: #f43f5e; 
        font-weight: 600; 
      }
      .loading { 
        color: #94a3b8; 
        font-style: italic; 
      }
      .error { 
        color: #fca5a5; 
        padding: 1rem; 
        background: rgba(239, 68, 68, 0.1); 
        border-radius: 12px; 
        margin-top: 1rem; 
        border: 1px solid rgba(239, 68, 68, 0.3);
      }
      .file-input-wrapper { 
        margin: 1rem 0; 
        display: flex; 
        align-items: center; 
        gap: 1rem; 
      }
      input[type="file"] { 
        padding: 0.75rem; 
        border: 2px solid rgba(234, 88, 12, 0.3); 
        border-radius: 12px; 
        cursor: pointer; 
        flex: 1; 
        background: rgba(15, 23, 42, 0.5);
        color: #e2e8f0;
        transition: all 0.3s ease;
      }
      input[type="file"]:hover { 
        border-color: #f97316; 
        background: rgba(249, 115, 22, 0.1);
      }
      input[type="file"]::file-selector-button {
        background: linear-gradient(135deg, #ea580c 0%, #f97316 100%);
        color: white;
        border: none;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        cursor: pointer;
        margin-right: 1rem;
        font-weight: 600;
      }
      .preview-area { 
        margin-top: 1.5rem; 
        padding: 1rem; 
        background: rgba(15, 23, 42, 0.5); 
        border: 2px dashed rgba(234, 88, 12, 0.3); 
        border-radius: 12px; 
        min-height: 100px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
      }
      .preview-area img { 
        max-width: 100%; 
        max-height: 400px; 
        border-radius: 12px; 
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      }
      .file-info { 
        margin-top: 1rem; 
        padding: 0.75rem; 
        background: rgba(16, 185, 129, 0.1); 
        border-left: 4px solid #10b981; 
        border-radius: 8px; 
        color: #cbd5e1;
      }
      .swarm-link { 
        color: #f97316; 
        text-decoration: none; 
        font-weight: 600; 
        transition: color 0.2s;
      }
      .swarm-link:hover { 
        color: #ea580c;
        text-decoration: underline; 
      }
      .tabs { 
        display: flex; 
        border-bottom: 2px solid rgba(234, 88, 12, 0.3); 
        margin-bottom: 1.5rem; 
        gap: 0.5rem; 
      }
      .tab { 
        padding: 0.75rem 1.5rem; 
        background: transparent; 
        border: none; 
        border-bottom: 3px solid transparent; 
        cursor: pointer; 
        font-weight: 600; 
        color: #94a3b8; 
        transition: all 0.3s ease; 
        margin: 0; 
        border-radius: 0; 
        box-shadow: none;
      }
      .tab::before {
        display: none;
      }
      .tab:hover { 
        color: #f97316; 
        background: rgba(249, 115, 22, 0.1); 
        transform: none;
      }
      .tab.active { 
        color: #f97316; 
        border-bottom-color: #f97316; 
        background: rgba(249, 115, 22, 0.1); 
        box-shadow: 0 4px 15px rgba(249, 115, 22, 0.2);
      }
      .tab-content { 
        display: none; 
      }
      .tab-content.active { 
        display: block; 
        max-height: 50vh;
        overflow-y: auto;
      }
      .tab-content.active::-webkit-scrollbar {
        width: 8px;
      }
      .tab-content.active::-webkit-scrollbar-track {
        background: rgba(15, 23, 42, 0.5);
        border-radius: 4px;
      }
      .tab-content.active::-webkit-scrollbar-thumb {
        background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
        border-radius: 4px;
      }
      .tab-content.active::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(135deg, #ea580c 0%, #f97316 100%);
      }
      .stamp-label-btn {
        background: none;
        border: none;
        padding: 0;
        margin: 0;
        box-shadow: none;
        color: #f97316;
        font-weight: 700;
        cursor: pointer;
        font-size: 1rem;
        text-decoration: underline dotted;
        transition: color 0.2s;
      }
      .stamp-label-btn::before { display: none; }
      .stamp-label-btn:hover { color: #ea580c; box-shadow: none; }
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        backdrop-filter: blur(4px);
        z-index: 100;
        align-items: center;
        justify-content: center;
      }
      .modal-overlay.open { display: flex; }
      .modal {
        background: #1e293b;
        border: 1px solid rgba(249,115,22,0.4);
        border-radius: 16px;
        padding: 2rem;
        max-width: 560px;
        width: 90%;
        max-height: 85vh;
        overflow-y: auto;
        box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        position: relative;
        animation: modalIn 0.2s ease;
      }
      @keyframes modalIn {
        from { transform: scale(0.92); opacity: 0; }
        to   { transform: scale(1);    opacity: 1; }
      }
      .modal h2 {
        margin: 0 0 1.5rem 0;
        color: #f97316;
        font-size: 1.3rem;
      }
      .modal-close {
        position: absolute;
        top: 1rem;
        right: 1rem;
        background: none;
        border: none;
        color: #94a3b8;
        font-size: 1.4rem;
        cursor: pointer;
        padding: 0.25rem 0.5rem;
        border-radius: 6px;
        box-shadow: none;
        line-height: 1;
      }
      .modal-close::before { display: none; }
      .modal-close:hover { color: #f97316; background: rgba(249,115,22,0.1); box-shadow: none; }
      .detail-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem 1.5rem;
      }
      .detail-row {
        display: flex;
        flex-direction: column;
        gap: 0.2rem;
      }
      .detail-row.full { grid-column: 1 / -1; }
      .detail-label {
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #64748b;
        font-weight: 600;
      }
      .detail-value {
        color: #e2e8f0;
        font-size: 0.95rem;
        font-weight: 500;
        word-break: break-all;
      }
      .detail-value.mono {
        font-family: monospace;
        font-size: 0.82rem;
        color: #94a3b8;
      }
      .detail-bar-wrap {
        height: 8px;
        background: rgba(255,255,255,0.08);
        border-radius: 4px;
        margin-top: 0.4rem;
        overflow: hidden;
      }
      .detail-bar {
        height: 100%;
        border-radius: 4px;
        background: linear-gradient(90deg, #f97316, #ea580c);
        transition: width 0.4s ease;
      }
      .modal-footer {
        margin-top: 1.5rem;
        padding-top: 1.25rem;
        border-top: 1px solid rgba(249,115,22,0.2);
      }
      .modal-upload-result {
        margin-top: 0.75rem;
        font-size: 0.875rem;
      }
      .modal-upload-result .success { color: #10b981; }
      .modal-upload-result .error-msg { color: #fca5a5; }
      .modal-upload-result .mono { font-family: monospace; word-break: break-all; color: #94a3b8; }
      /* Buy stamp form */
      .buy-form {
        display: flex;
        flex-direction: column;
        gap: 1.25rem;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
      }
      .form-group label {
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: #64748b;
        font-weight: 600;
      }
      .form-input {
        background: rgba(15, 23, 42, 0.7);
        border: 1px solid rgba(249, 115, 22, 0.3);
        border-radius: 10px;
        padding: 0.65rem 1rem;
        color: #e2e8f0;
        font-size: 0.95rem;
        width: 100%;
        transition: border-color 0.2s, box-shadow 0.2s;
      }
      .form-input:focus {
        outline: none;
        border-color: #f97316;
        box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.15);
      }
      .form-input::placeholder { color: #475569; }
      .buy-result-success {
        padding: 0.85rem 1rem;
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.3);
        border-radius: 10px;
        color: #10b981;
        font-size: 0.9rem;
      }
      .buy-result-error {
        padding: 0.85rem 1rem;
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        border-radius: 10px;
        color: #fca5a5;
        font-size: 0.9rem;
      }
      .btn-green {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%) !important;
        box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3) !important;
      }
      .btn-green:hover { box-shadow: 0 6px 20px rgba(16, 185, 129, 0.5) !important; }
      .stamps-actions { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    </style>
    <style>
      /* ========= NEW DESIGN OVERRIDES ========= */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: transparent !important;
        display: flex !important;
        align-items: flex-start;
        justify-content: center;
        padding: 1.5rem !important;
        max-width: none !important;
        margin: 0 !important;
      }
      .card { display: none !important; }
      .app-card {
        background: linear-gradient(160deg, #161f35 0%, #111827 60%, #1d2d43 100%);
        border-radius: 20px;
        border: 1px solid #f97316;
        width: 100%;
        max-width: 720px;
        height: 480px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        box-shadow: 0 25px 60px rgba(0,0,0,0.5);
      }
      .app-header { padding: 1.5rem 1.5rem 0; text-align: center; }
      .app-title { font-size: 1.6rem; font-weight: 700; color: #f97316; letter-spacing: -0.5px; background: none; -webkit-text-fill-color: #f97316; }
      /* Tab bar */
      .new-tab-bar {
        display: flex; padding: 0 1.5rem; margin-top: 1rem;
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }
      .new-tab {
        padding: 0.75rem 1.25rem; background: none; border: none;
        border-bottom: 2px solid transparent; margin-bottom: -1px;
        font-size: 0.75rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
        /* color: #4b5563; cursor: pointer; transition: color 0.2s, border-color 0.2s; */
        color: #b5b5b5; cursor: pointer; transition: color 0.2s, border-color 0.2s;
        box-shadow: none; border-radius: 0; margin-right: 0;
      }
      .new-tab::before { display: none; }
      .new-tab:hover { color: #9ca3af; background: none; box-shadow: none; transform: none; }
      .new-tab.active { color: #f97316; border-bottom-color: #f97316; }
      /* Tab content */
      .new-tab-content { display: none; padding: 1.25rem 1.5rem 1.5rem; overflow-y: auto; flex: 1; }
      .new-tab-content.active { display: flex; flex-direction: column; }
      /* Scrollable list area */
      .scroll-area { max-height: 55vh; overflow-y: auto; margin-top: 0.75rem; }
      .scroll-area::-webkit-scrollbar { width: 5px; }
      .scroll-area::-webkit-scrollbar-track { background: transparent; }
      .scroll-area::-webkit-scrollbar-thumb { background: rgba(249,115,22,0.25); border-radius: 3px; }
      /* BUY button */
      .buy-stamp-btn-main {
        width: 100%; background: rgba(16,185,129,0.12) !important;
        border: 1px solid rgba(16,185,129,0.4) !important; color: #10b981 !important;
        font-family: monospace; font-size: 0.9rem; font-weight: 700;
        letter-spacing: 0.14em; text-transform: uppercase;
        padding: 1rem; border-radius: 14px !important;
        cursor: pointer; transition: background 0.2s, box-shadow 0.2s;
        box-shadow: none !important; margin: 0; position: relative; overflow: hidden;
      }
      .buy-stamp-btn-main::before { display: none; }
      .buy-stamp-btn-main:hover { background: rgba(16,185,129,0.2) !important; box-shadow: 0 0 22px rgba(16,185,129,0.18) !important; }
      .buy-stamp-btn-main span { position: relative; z-index: 1; }
      /* Stamp cards */
      .stamp-card {
        display: flex; align-items: center;
        background: #1a2236; border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px; margin-bottom: 0.5rem;
        cursor: pointer; transition: background 0.15s, border-color 0.15s;
        overflow: hidden; min-height: 52px;
      }
      .stamp-card:hover { background: #1e2a40; border-color: rgba(249,115,22,0.25); }
      .stamp-card-bar { width: 4px; align-self: stretch; background: #f97316; flex-shrink: 0; }
      .stamp-card-bar.ok       { background: #10b981; }
      .stamp-card-bar.warn     { background: #f97316; }
      .stamp-card-bar.critical { background: #ef4444; }
      .stamp-card-inner {
        display: flex; align-items: center; gap: 0.75rem;
        padding: 0.6rem 0.85rem; width: 100%; overflow: hidden;
      }
      .stamp-label {
        font-family: monospace; font-size: 1rem; font-weight: 700;
        color: #f97316; width: 130px; flex-shrink: 0;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      }
      .stamp-label.ok       { color: #10b981; }
      .stamp-label.warn     { color: #f97316; }
      .stamp-label.critical { color: #ef4444; }
      .stamp-progress-wrap { flex: 1; display: flex; align-items: center; gap: 0.6rem; min-width: 0; }
      .stamp-progress-bar-bg { flex: 1; height: 5px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; min-width: 0; }
      .stamp-progress-bar-fill { height: 100%; border-radius: 999px; background: #f97316; transition: width 0.4s ease; }
      .stamp-progress-bar-fill.fill-ok       { background: #10b981; }
      .stamp-progress-bar-fill.fill-warn     { background: #f97316; }
      .stamp-progress-bar-fill.fill-critical { background: #ef4444; }
      .stamp-pct { font-family: monospace; font-size: 0.75rem; color: #b5b5b5; width: 32px; text-align: right; flex-shrink: 0; }
      .stamp-size-badge {
        background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08);
        border-radius: 8px; padding: 0.28rem 0.6rem;
        font-family: monospace; font-size: 0.72rem; color: #b5b5b5;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        width: 150px; flex-shrink: 0; text-align: right;
      }
      .stamp-ttl-badge {
        display: flex; align-items: center; justify-content: center; gap: 0.4rem;
        border-radius: 8px; padding: 0.28rem 0.65rem;
        font-family: monospace; font-size: 0.72rem; font-weight: 600;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        width: 110px; flex-shrink: 0; border: 1px solid;
      }
      .stamp-ttl-badge.ok    { color: #10b981; border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.08); }
      .stamp-ttl-badge.warn  { color: #f97316; border-color: rgba(249,115,22,0.3);  background: rgba(249,115,22,0.08); }
      .stamp-ttl-badge.critical { color: #ef4444; border-color: rgba(239,68,68,0.3); background: rgba(239,68,68,0.08); }
      .stamp-ttl-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
      .stamp-ttl-badge.ok       .stamp-ttl-dot { background: #10b981; }
      .stamp-ttl-badge.warn     .stamp-ttl-dot { background: #f97316; }
      .stamp-ttl-badge.critical .stamp-ttl-dot { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.7); }
      @media (max-width: 680px) { .stamp-size-badge, .stamp-pct { display: none; } }
      /* State messages */
      .state-text { color: #4b5563; font-size: 0.875rem; font-style: italic; text-align: center; padding: 2rem 1rem; }
      .state-error {
        color: #fca5a5; background: rgba(239,68,68,0.07);
        border: 1px solid rgba(239,68,68,0.22); border-radius: 10px;
        padding: 0.8rem 1rem; font-size: 0.875rem; margin-top: 0.75rem;
      }
      /* ---- Upload Tab ---- */
      .upload-tab-wrap { padding: 0; }
      .upload-gateway-title {
        text-align: center; font-size: 1.5rem; font-weight: 800;
        color: #e2e8f0; letter-spacing: -0.02em; margin-bottom: 0.55rem;
      }
      .upload-gateway-sub {
        text-align: center; font-family: monospace; font-size: 0.85rem;
        color: #4b5563; margin-bottom: 1.5rem;
      }
      /* Step indicator */
      .upload-steps {
        display: flex; align-items: center; gap: 0; margin-bottom: 1.25rem;
        background: #0d1117; border-radius: 12px; overflow: hidden;
        border: 1px solid rgba(255,255,255,0.06);
      }
      .upload-step {
        flex: 1; display: flex; align-items: center; gap: 0.55rem;
        padding: 0.75rem 1rem; font-family: monospace;
        font-size: 0.72rem; font-weight: 700; letter-spacing: 0.1em;
        color: #374151; text-transform: uppercase; cursor: default;
        border-right: 1px solid rgba(255,255,255,0.06); user-select: none;
      }
      .upload-step:last-child { border-right: none; }
      .upload-step.active { color: #e2e8f0; }
      .upload-step.done   { color: #10b981; }
      .upload-step-num {
        width: 22px; height: 22px; border-radius: 50%; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
        font-size: 0.7rem; font-weight: 800;
        background: rgba(255,255,255,0.06); color: #4b5563;
      }
      .upload-step.active .upload-step-num { background: #f97316; color: #fff; }
      .upload-step.done   .upload-step-num { background: #10b981; color: #fff; }
      /* Stamp picker list */
      .upload-stamp-list { max-height: 44vh; overflow-y: auto; margin-bottom: 0.9rem; }
      .upload-stamp-list::-webkit-scrollbar { width: 4px; }
      .upload-stamp-list::-webkit-scrollbar-thumb { background: rgba(249,115,22,0.2); border-radius: 3px; }
      .upload-stamp-option {
        display: flex; align-items: center; gap: 0.75rem;
        background: #1a2236; border: 1px solid rgba(255,255,255,0.06);
        border-radius: 12px; padding: 0;
        margin-bottom: 0.5rem; cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
        min-height: 52px; overflow: hidden;

      .status-refresh-icon:hover { color: #9ca3af; background: rgba(255,255,255,0.06); }
      .status-refresh-icon:disabled { opacity: 0.3; cursor: not-allowed; }
      .status-section {
        padding: 0.5rem 0.85rem;
        border-bottom: 1px solid rgba(255,255,255,0.04);
      }
      .status-section:last-child { border-bottom: none; }
      .status-section-label {
        font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.12em;
        font-weight: 700; color: #cbd5e1; margin-bottom: 0.35rem;
      }
      .status-dot {
        width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; display: inline-block; margin-right: 0.3rem; vertical-align: middle;
      }
      .status-dot.ok { background: #10b981; }
      .status-dot.warn { background: #f97316; }
      .status-dot.error { background: #ef4444; box-shadow: 0 0 4px rgba(239,68,68,0.5); }
      .status-dot.unknown { background: #374151; }
      .status-row {
        display: flex; justify-content: space-between; align-items: baseline;
        gap: 0.5rem; margin-bottom: 0.18rem;
      }
      .status-row:last-child { margin-bottom: 0; }
      .status-key {
        font-size: 0.66rem; color: #b5b5b5; font-weight: 600;
        text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0;
      }
      .status-val {
        font-family: monospace; font-size: 0.78rem; font-weight: 700;
        color: #cbd5e1; text-align: right;
      }
      .status-val.green { color: #10b981; }
      .status-val.orange { color: #f97316; }
      .status-val.red { color: #ef4444; }
      .status-val.muted { color: #4b5563; }
      .status-mode-badge {
        display: inline-block; font-family: monospace; font-size: 0.65rem; font-weight: 700;
        letter-spacing: 0.08em; text-transform: uppercase;
        padding: 0.1rem 0.4rem; border-radius: 4px; border: 1px solid;
      }
      .status-mode-badge.full { color: #10b981; border-color: rgba(16,185,129,0.3); background: rgba(16,185,129,0.07); }
      .status-mode-badge.light { color: #f97316; border-color: rgba(249,115,22,0.3); background: rgba(249,115,22,0.07); }
      .status-mode-badge.dev { color: #06b6d4; border-color: rgba(6,182,212,0.3); background: rgba(6,182,212,0.07); }
      .status-mode-badge.unknown { color: #4b5563; border-color: rgba(75,85,99,0.3); background: transparent; }
    </style>
  </head>
  <body>
    <!-- History Item Modal -->
    <div class="modal-overlay" id="hist-item-modal">
      <div class="modal" style="padding:0;border-radius:18px;display:flex;flex-direction:column;border:1px solid #f97316">
        <div class="buy-modal-header">
          <div class="buy-modal-title">UPLOADED FILE DATA</div>
          <button class="buy-modal-close-btn" id="hist-item-close">&#x2715;</button>
        </div>
        <div style="padding:1.25rem 1.6rem 0;overflow-y:auto;max-height:80vh">
          <div class="hi-card">
            <div class="hi-field-label">FILE NAME</div>
            <div class="hi-field-value" id="hi-name">—</div>
            <hr class="hi-separator" />
            <div class="hi-field-label">SWARM HASH REFERENCE</div>
            <div class="hi-hash-box" id="hi-reference">—</div>
            <hr class="hi-separator" />
            <div class="hi-meta-grid">
              <div><div class="hi-meta-label">SIZE</div><div class="hi-meta-value" id="hi-size">—</div></div>
              <div><div class="hi-meta-label">DATE</div><div class="hi-meta-value" id="hi-date">—</div></div>
              <div><div class="hi-meta-label">TIME</div><div class="hi-meta-value" id="hi-time">—</div></div>
            </div>
            <div class="hi-meta-grid-full">
              <div class="hi-meta-label">USED STAMP</div>
              <div class="hi-meta-value orange" id="hi-stamp">—</div>
            </div>
          </div>
          <div class="hi-card">
            <div class="hi-field-label">ACCESS VIA LOCAL NODE</div>
            <a class="hi-url-value" id="hi-url" href="#" target="_blank">—</a>
            <div id="hi-preview" style="display:none;margin-top:0.9rem"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Buy Stamp Modal -->
    <div class="modal-overlay" id="buy-stamp-modal">
      <div class="modal buy-modal-wrap" style="border:1px solid #f97316">
        <div class="buy-modal-header">
          <div class="buy-modal-title">Buy Postage Stamp</div>
          <button class="buy-modal-close-btn" id="buy-modal-close">&#x2715;</button>
        </div>
        <div class="buy-form-body">
          <div class="buy-two-col">
            <div class="buy-field">
              <div class="buy-field-label">
                <span class="buy-field-label-left"><span class="buy-label-dot"></span>CAPACITY (MB)</span>
              </div>
              <input type="number" id="buy-size" class="buy-input" min="1" step="1" placeholder="e.g. 100" />
            </div>
            <div class="buy-field">
              <div class="buy-field-label">
                <span class="buy-field-label-left"><span class="buy-label-dot"></span>TTL</span>
              </div>
              <input type="text" id="buy-duration" class="buy-input" placeholder="1d · 1w · 1m" />
            </div>
          </div>
          <div class="buy-field">
            <div class="buy-field-label">
              <span class="buy-field-label-left"><span class="buy-label-dot"></span>IDENTIFIER</span>
              <span class="buy-opt-badge">OPT</span>
            </div>
            <input type="text" id="buy-label" class="buy-input" placeholder="sys_stamp_01" />
          </div>
          <label class="buy-toggle-row" for="buy-immutable">
            IMMUTABLE
            <input type="checkbox" id="buy-immutable" class="buy-toggle-input" />
          </label>
          <div id="buy-cost-estimate" style="display:none;margin-bottom:0.75rem;padding:0.6rem 0.9rem;background:rgba(251,146,60,0.08);border:1px solid rgba(251,146,60,0.25);border-radius:8px;font-size:0.82rem;color:#fb923c;letter-spacing:0.04em">
            <span class="buy-field-label-left" style="display:block;font-size:0.7rem;margin-bottom:0.2rem;opacity:0.7">ESTIMATED COST</span>
            <span id="buy-cost-value" style="font-family:monospace;font-size:1rem;font-weight:600">—</span>
            <span style="margin-left:0.3rem;font-size:0.75rem;opacity:0.75">BZZ</span>
          </div>
          <button id="buy-submit-btn" class="buy-stamp-submit-btn"><span>BUY POSTAGE STAMP</span></button>
          <div id="buy-result"></div>
        </div>
      </div>
    </div>

    <!-- Stamp Detail Modal -->
    <div class="modal-overlay" id="stamp-modal">
      <div class="modal" style="padding:0;border-radius:18px;display:flex;flex-direction:column;border:1px solid #f97316">
        <div class="buy-modal-header">
          <div class="buy-modal-title" id="modal-title">Stamp Details</div>
          <button class="buy-modal-close-btn" id="modal-close">&#x2715;</button>
        </div>
        <div class="modal-inner" style="padding-top:1.25rem">
          <div id="modal-body"></div>
          <input type="file" id="modal-file-input" accept="*/*" style="display:none" />
          <button id="modal-upload-btn" class="d-target-upload-btn"><span>UPLOAD FILE</span></button>
          <div id="modal-upload-result" class="d-modal-upload-result"></div>
          <div class="d-extend-row">
            <input type="number" id="extend-size" class="d-extend-input" min="1" step="1" placeholder="+ Size" />
            <input type="text" id="extend-duration" class="d-extend-input" placeholder="+ TTL" />
            <button id="extend-submit-btn" class="d-extend-btn"><span>EXTEND</span></button>
          </div>
          <div id="extend-result" class="d-extend-result"></div>
        </div>
      </div>
    </div>

    <!-- Main app -->
    <div class="app-card">
      <div class="app-header">
        <div class="app-title">Swarm MCP</div>
      </div>
      <div class="new-tab-bar">
        <button class="new-tab active" data-tab="stamps">Postage Stamps</button>
        <button class="new-tab" data-tab="upload">Upload File</button>
        <button class="new-tab" data-tab="history">Upload History</button>
        <button class="new-tab" data-tab="status">Node Status</button>
      </div>

      <!-- Stamps tab -->
      <div id="stamps-tab" class="new-tab-content active">
        <button id="buy-stamp-btn" class="buy-stamp-btn-main"><span>BUY POSTAGE STAMP</span></button>
        <div class="scroll-area" id="stamps-table"></div>
      </div>

      <!-- Upload tab -->
      <div id="upload-tab" class="new-tab-content">
        <div class="upload-tab-wrap">
          <!-- Step indicator -->
          <div class="upload-steps">
            <div class="upload-step active" id="upload-step-1-indicator">
              <div class="upload-step-num">1</div>SELECT STAMP
            </div>
            <div class="upload-step" id="upload-step-2-indicator">
              <div class="upload-step-num">2</div>UPLOAD ASSET
            </div>
          </div>
          <!-- Step 1: Stamp selection -->
          <div id="upload-step-1">
            <div class="upload-stamp-list" id="upload-stamp-list"><div class="state-text">Loading stamps…</div></div>
            <button id="upload-continue-btn" class="upload-stamp-continue-btn" disabled><span>CONTINUE</span></button>
          </div>
          <!-- Step 2: File selection + upload -->
          <div id="upload-step-2" style="display:none">
            <div class="upload-selected-stamp-bar">
              <div class="upload-selected-stamp-info">
                <div class="upload-selected-stamp-dot"></div>
                <div class="upload-selected-stamp-label" id="upload-selected-stamp-label">—</div>
              </div>
              <button id="upload-change-stamp-btn" class="upload-change-stamp-btn"><span>← CHANGE</span></button>
            </div>
            <div class="upload-panel">
              <div class="upload-select-row">
                <button id="select-asset-btn" class="upload-select-btn"><span>SELECT ASSET</span></button>
                <div class="upload-file-display" id="file-name-display">// No file selected</div>
              </div>
            </div>
            <button id="upload-btn" class="upload-stamp-continue-btn" disabled style="margin-top:0.75rem;"><span>UPLOAD</span></button>
            <input type="file" id="file-input" accept="*/*" style="display:none" />
            <div id="upload-result" class="upload-result" style="margin-top:0.75rem"></div>
            <div id="preview-area" class="preview-area" style="display:none"></div>
          </div>
        </div>
      </div>

      <!-- History tab -->
      <div id="history-tab" class="new-tab-content">
        <button id="history-btn" style="display:none"></button>
        <div class="scroll-area" id="history-table"></div>
      </div>

      <!-- Status tab -->
      <div id="status-tab" class="new-tab-content">
        <div class="status-wrap">
          <div id="status-content"></div>
        </div>
      </div>
    </div>

    <script type="module" src="./src/mcp-app.ts"></script>
  </body>
</html>
